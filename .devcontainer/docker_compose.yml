name: ahri-tre-r-dev

services:
  r:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        AHRI_TRE_RELEASE_TAG: ${AHRI_TRE_RELEASE_TAG:-v0.8.3}
        AHRI_TRE_RELEASE_REPOSITORY: ${AHRI_TRE_RELEASE_REPOSITORY:-AHRIORG/ahri-tre-rs}
        AHRI_TRE_ALLOW_LATEST_FALLBACK: ${AHRI_TRE_ALLOW_LATEST_FALLBACK:-1}
        AHRI_TRE_RUNTIME_OPTIONAL: ${AHRI_TRE_RUNTIME_OPTIONAL:-1}
        AHRI_TRE_RUNTIME_LOCAL_ARCHIVE: ${AHRI_TRE_RUNTIME_LOCAL_ARCHIVE:-}
        AHRI_TRE_RUNTIME_LOCAL_CHECKSUM: ${AHRI_TRE_RUNTIME_LOCAL_CHECKSUM:-}
      secrets:
        - github_token
    init: true
    user: root
    privileged: true
    command: /usr/local/bin/devcontainer_startup.sh
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    depends_on:
      tre-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AHRI_TRE_LAKE_CONTAINER_PATH: ${AHRI_TRE_LAKE_CONTAINER_PATH:-/workspaces/ahri-tre-r/.lake}
      TRE_LAKE_PATH: ${AHRI_TRE_LAKE_CONTAINER_PATH:-/workspaces/ahri-tre-r/.lake}
      TRE_HOST: tre-postgres
      TRE_PORT: 5432
      TRE_DBNAME: ${TRE_DBNAME:-tre}
      TRE_USER: ${TRE_USER:-tre_user}
      TRE_PWD: ${TRE_PWD:-tre_password}
    volumes:
      - ..:/workspaces/ahri-tre-r:cached
      - tre-lake:${AHRI_TRE_LAKE_CONTAINER_PATH:-/workspaces/ahri-tre-r/.lake}
      - vscode-server:/home/vscode/.vscode-server
    networks:
      tre-net:
        aliases:
          - ahri-tre-r-dev
    expose:
      - "8080"
    extra_hosts:
      - host.docker.internal:host-gateway

  tre-postgres:
    image: postgres:18-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_BOOTSTRAP_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASSWORD:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-postgres}"
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${PGHOSTPORT:-5432}:5432"
    networks:
      tre-net:
        aliases:
          - tre-postgres
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  tre-lake:
  postgres-data:
  vscode-server:

networks:
  tre-net:

secrets:
  github_token:
    environment: GITHUB_TOKEN
